<div class="toggle-container" id="toggle">
    <div class="slider"></div>
    <div class="label govt active">GOVT</div>
    <div class="label private">PRIVATE</div>
</div>

<style>
.toggle-container {
    position: relative;
    width: 220px;
    height: 60px;
    border-radius: 40px;
    background: linear-gradient(145deg, #1e293b, #0f172a);
    box-shadow: 
        6px 6px 12px #020617,
        -6px -6px 12px #1e293b;
    cursor: pointer;
    overflow: hidden;
    font-family: sans-serif;
}

.slider {
    position: absolute;
    width: 110px;
    height: 60px;
    background: linear-gradient(145deg, #38bdf8, #0ea5e9);
    border-radius: 40px;
    top: 0;
    left: 0;
    transition: all 0.6s cubic-bezier(.68,-0.55,.27,1.55);
    box-shadow: 
        inset 0 0 8px rgba(255,255,255,0.4),
        0 6px 15px rgba(0,0,0,0.4);
}

/* shimmer */
.slider::before {
    content: '';
    position: absolute;
    width: 180%;
    height: 180%;
    top: -40%;
    left: -40%;
    background: radial-gradient(circle, rgba(255,255,255,0.25) 10%, transparent 40%);
    animation: waterMove 5s linear infinite;
    opacity: 0.2;
}

@keyframes waterMove {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* RIGHT POSITION */
.toggle-container.right .slider {
    left: 110px;
    background: linear-gradient(145deg, #22c55e, #16a34a);
}

/* LABELS */
.label {
    position: absolute;
    width: 50%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #94a3b8;
    font-weight: bold;
    z-index: 2;
    transition: 0.3s;
    font-size: 14px;
}

.label.govt { left: 0; }
.label.private { right: 0; }

.active {
    color: #fff;
}

/* ripple */
.ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transform: scale(0);
    animation: rippleAnim 0.7s ease-out;
    pointer-events: none;
}

@keyframes rippleAnim {
    to {
        transform: scale(3.5);
        opacity: 0;
    }
}

/* droplets */
.drop {
    position: absolute;
    width: 5px;
    height: 5px;
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
    pointer-events: none;
    animation: dropAnim 0.6s ease-out forwards;
}

@keyframes dropAnim {
    to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}
</style>

<script>
const toggle = document.getElementById('toggle');
const govt = toggle.querySelector('.govt');
const priv = toggle.querySelector('.private');

toggle.addEventListener('click', (e) => {
    const rect = toggle.getBoundingClientRect();
    const clickX = e.clientX - rect.left;

    const isRight = clickX > rect.width / 2;

    // set position based on click
    if (isRight) {
        toggle.classList.add('right');
        govt.classList.remove('active');
        priv.classList.add('active');
    } else {
        toggle.classList.remove('right');
        govt.classList.add('active');
        priv.classList.remove('active');
    }

    // 💧 ripple
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.width = ripple.style.height = "60px";
    ripple.style.left = (clickX - 30) + "px";
    ripple.style.top = (e.offsetY - 30) + "px";
    toggle.appendChild(ripple);
    setTimeout(() => ripple.remove(), 700);

    // 💦 droplets
    for (let i = 0; i < 5; i++) {
        const drop = document.createElement('span');
        drop.className = 'drop';

        const angle = Math.random() * 2 * Math.PI;
        const distance = 15 + Math.random() * 15;

        drop.style.left = clickX + "px";
        drop.style.top = e.offsetY + "px";

        drop.style.setProperty('--x', Math.cos(angle) * distance + "px");
        drop.style.setProperty('--y', Math.sin(angle) * distance + "px");

        toggle.appendChild(drop);
        setTimeout(() => drop.remove(), 600);
    }
});
</script>
